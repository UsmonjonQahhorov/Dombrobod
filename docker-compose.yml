services:
  bot:
    container_name: dombrobod-bot
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_USER: postgres
      DB_PASSWORD: 1
      DB_NAME: dombrobod_db
      DB_PORT: 5432
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  postgres:
    container_name: dombrobod-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: dombrobod_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dombrobod_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
